services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: server
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

    environment:
      LLM_HOST: vllm
      LLM_PORT: 8000

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333

      WEAVIATE_HOST: weaviate
      WEAVIATE_PORT: 8080
      WEAVIATE_PORT_GRPC: 50051

      SERVER_HOST: server
      SERVER_PORT: 8080

    volumes:
      - hf_cache:/root/.cache/huggingface
      - ./server/settings.toml:/app/server/settings.toml

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/config', timeout=5)"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 120s

volumes:
  hf_cache:
